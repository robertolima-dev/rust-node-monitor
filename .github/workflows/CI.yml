name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Build the native addon for every supported target and upload as artifacts.
  # ---------------------------------------------------------------------------
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - host: macos-latest
            target: aarch64-apple-darwin
          - host: macos-13
            target: x86_64-apple-darwin
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            zig: true
          - host: windows-latest
            target: x86_64-pc-windows-msvc
    name: build - ${{ matrix.target }}
    runs-on: ${{ matrix.host }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install dependencies
        run: npm install
      - name: Build (zig cross-compile)
        if: ${{ matrix.zig }}
        run: npx napi build --platform --release --target ${{ matrix.target }} --zig --js binding.js --dts binding.d.ts
      - name: Build (native)
        if: ${{ !matrix.zig }}
        run: npx napi build --platform --release --target ${{ matrix.target }} --js binding.js --dts binding.d.ts
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: "*.node"
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Build natively on each OS and run the JS test suite.
  # ---------------------------------------------------------------------------
  test:
    strategy:
      fail-fast: false
      matrix:
        host: [ubuntu-latest, macos-latest, windows-latest]
        node: [18, 20, 22]
    name: test - ${{ matrix.host }} - node ${{ matrix.node }}
    runs-on: ${{ matrix.host }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: npm install
      - run: npm run build
      - run: npm test

  # ---------------------------------------------------------------------------
  # On a version tag, gather all binaries and publish to npm.
  # ---------------------------------------------------------------------------
  publish:
    name: publish
    runs-on: ubuntu-latest
    needs: [build, test]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - run: npm install
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Move binaries into per-platform npm dirs
        run: |
          cp artifacts/*.node . || true
          npx napi artifacts --dir . || true
      - name: Build JS layer
        run: npm run build:js
      - name: Publish to npm
        run: |
          npm publish --access public --provenance
          for dir in npm/*/; do
            (cd "$dir" && npm publish --access public --provenance) || true
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
